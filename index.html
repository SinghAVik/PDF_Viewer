<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline PDF Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0e13;
      --stage: #06080c;
      --panel: #12161d;
      --panel-2: #1b212b;
      --panel-3: #232b37;
      --line: #2f3744;
      --line-strong: #475063;
      --text: #f4f7fb;
      --muted: #aeb8c8;
      --faint: #6e7a8c;
      /* User-chosen dark accent (kept). --accent-bright is reserved for
         focus rings / active states so they stay visible on dark. */
      --accent: #15124e;
      --accent-2: #031612;
      --accent-bright: #399fe8;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.45);
      --page-shadow: 0 18px 52px rgba(0, 0, 0, 0.55);
      --radius: 8px;
      --sidebar-w: 250px;
      --viewer-gap: 16px;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      transition:
        background 150ms ease,
        border-color 150ms ease,
        color 150ms ease,
        transform 150ms ease;
    }

    button:hover:not(:disabled) {
      background: var(--panel-3);
      border-color: var(--line-strong);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      color: var(--faint);
      cursor: not-allowed;
      opacity: 0.7;
    }

    input {
      color: var(--text);
      background: #0c1015;
      border: 1px solid var(--line);
      outline: none;
    }

    input:focus-visible,
    button:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent-bright) 76%, transparent);
      outline-offset: 2px;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      min-width: 320px;
      background:
        radial-gradient(circle at 18% -18%, rgba(79, 181, 255, 0.1), transparent 34rem),
        linear-gradient(180deg, #0d121a 0%, var(--bg) 52%);
    }

    .toolbar {
      position: relative;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      min-height: 68px;
      padding: 12px clamp(12px, 2vw, 22px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(11, 14, 19, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.3);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .sidebar-toggle {
      flex: 0 0 auto;
    }

    .sidebar-toggle.is-active:not(:disabled) {
      border-color: color-mix(in srgb, var(--accent-bright) 50%, var(--line));
      color: var(--accent-bright);
      background: #11202e;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      color: #e8eefc;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .mark svg {
      width: 21px;
      height: 21px;
    }

    .title-block {
      min-width: 0;
    }

    .title {
      overflow: hidden;
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meta {
      overflow: hidden;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      height: 40px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0e131b;
    }

    .control-group > button {
      width: 39px;
      height: 38px;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }

    .control-group > button:last-child {
      border-right: 0;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: var(--radius);
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 14px;
      border-color: rgba(79, 181, 255, 0.42);
      border-radius: var(--radius);
      background: #143149;
      color: #edf8ff;
      font-weight: 700;
    }

    .primary-button:hover:not(:disabled) {
      background: #142f44;
    }

    .page-field {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 40px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0e131b;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .page-field input {
      width: 56px;
      height: 28px;
      padding: 0 8px;
      border-radius: 6px;
      text-align: center;
    }

    .zoom-readout {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      height: 38px;
      padding: 0 10px;
      border-right: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    .invert-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      min-width: 0;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0e131b;
    }

    .switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: 42px;
      height: 24px;
      flex: 0 0 auto;
      cursor: pointer;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .track {
      position: absolute;
      inset: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0a0e14;
      transition:
        background 160ms ease,
        border-color 160ms ease;
    }

    .thumb-dot {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--muted);
      transition:
        transform 160ms ease,
        background 160ms ease;
    }

    .switch input:checked + .track {
      border-color: rgba(79, 181, 255, 0.56);
      background: #12324c;
    }

    .switch input:checked + .track .thumb-dot {
      transform: translateX(18px);
      background: var(--accent-bright);
    }

    .switch input:disabled ~ .track {
      opacity: 0.5;
    }

    .swatches {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .swatch {
      width: 22px;
      height: 22px;
      padding: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: var(--swatch);
    }

    .swatch.is-active {
      border-color: var(--accent-bright);
      box-shadow: 0 0 0 2px rgba(79, 181, 255, 0.18);
    }

    .color-input {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 6px;
      cursor: pointer;
    }

    .color-input::-webkit-color-swatch-wrapper {
      padding: 3px;
    }

    .color-input::-webkit-color-swatch {
      border: 0;
      border-radius: 4px;
    }

    /* ---------- Viewer layout: sidebar + document column ---------- */
    .viewer {
      position: relative;
      display: flex;
      gap: var(--viewer-gap);
      min-height: 0;
      padding: clamp(10px, 2vw, 22px);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex: 0 0 var(--sidebar-w);
      flex-direction: column;
      width: var(--sidebar-w);
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      transition: margin-left 200ms ease, opacity 160ms ease;
    }

    .viewer.is-sidebar-collapsed .sidebar {
      margin-left: calc(-1 * (var(--sidebar-w) + var(--viewer-gap)));
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-tabs {
      display: flex;
      flex: 0 0 auto;
      padding: 8px;
      gap: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sidebar-tab {
      flex: 1 1 0;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .sidebar-tab.is-active {
      color: var(--text);
      background: var(--panel-2);
      border-color: var(--line);
    }

    .sidebar-body {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
    }

    .sidebar-pane {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .sidebar-pane::-webkit-scrollbar { width: 10px; }
    .sidebar-pane::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: var(--line-strong);
      background-clip: padding-box;
    }

    /* Thumbnails */
    .thumbs-pane {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .thumb-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 100%;
      padding: 6px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
    }

    .thumb-item:hover:not(.is-current) {
      background: var(--panel-2);
      border-color: var(--line);
    }

    .thumb-item.is-current {
      border-color: var(--accent-bright);
      background: #11202e;
    }

    .thumb-canvas-wrap {
      display: grid;
      place-items: center;
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      background: #20242c;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.4);
    }

    .thumb-canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .thumb-label {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .thumb-item.is-current .thumb-label {
      color: var(--text);
      font-weight: 700;
    }

    /* Outline / contents */
    .outline-pane { font-size: 13px; }

    .outline-list,
    .outline-list ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .outline-list ul {
      margin-left: 12px;
      border-left: 1px solid var(--line);
      padding-left: 6px;
    }

    .outline-row {
      display: flex;
      align-items: flex-start;
      gap: 2px;
    }

    .outline-twisty {
      flex: 0 0 auto;
      width: 18px;
      height: 24px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--faint);
      line-height: 24px;
    }

    .outline-twisty.is-empty { visibility: hidden; }

    .outline-link {
      flex: 1 1 auto;
      min-width: 0;
      padding: 4px 6px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      text-align: left;
      line-height: 1.35;
    }

    .outline-link:hover:not(:disabled) {
      background: var(--panel-2);
      color: var(--text);
    }

    .outline-link.is-current {
      color: var(--text);
      background: #11202e;
    }

    .outline-children.is-collapsed { display: none; }

    .sidebar-empty {
      padding: 18px 10px;
      color: var(--faint);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    /* ---------- Document column ---------- */
    .doc-col {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
    }

    /* Non-scrolling frame so overlays stay pinned over the viewport. */
    .document-shell {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 50% 0%, rgba(79, 181, 255, 0.05), transparent 60%),
        var(--stage);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.4), var(--shadow);
    }

    /* The actual scroller for continuous page flow. */
    .doc-scroll {
      position: absolute;
      inset: 0;
      overflow: auto;
      outline: none;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .doc-scroll::-webkit-scrollbar { width: 14px; height: 14px; }
    .doc-scroll::-webkit-scrollbar-thumb {
      border: 4px solid transparent;
      border-radius: 999px;
      background: var(--line-strong);
      background-clip: padding-box;
    }
    .doc-scroll::-webkit-scrollbar-thumb:hover {
      background: #5b6678;
      background-clip: padding-box;
    }

    .pages {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: clamp(14px, 2.4vw, 28px);
      min-height: 100%;
    }

    /* Wrapper carries the paper shadow so the shadow is never inverted. */
    .page-wrap {
      position: relative;
      flex: 0 0 auto;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: #20242c;
      box-shadow: var(--page-shadow);
      transition: border-color 160ms ease;
    }

    .pages.is-inverted .page-wrap {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .page-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 2px;
      /* Invert/tint recipe injected on .pages; never touches the surround. */
      filter: var(--page-filter, none);
    }

    .page-canvas:not(.is-rendered) { visibility: hidden; }

    .page-spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 26px;
      height: 26px;
      margin: -13px 0 0 -13px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--accent-bright);
      border-radius: 50%;
      animation: spin 720ms linear infinite;
    }

    .page-wrap.is-rendered .page-spinner { display: none; }

    .drop-layer,
    .status-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      pointer-events: none;
    }

    .drop-layer {
      opacity: 0;
      background: rgba(6, 8, 12, 0.74);
      transition: opacity 160ms ease;
    }

    .drop-layer.is-visible { opacity: 1; }

    .status-panel {
      width: min(560px, 100%);
      padding: clamp(22px, 5vw, 34px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: rgba(15, 19, 26, 0.94);
      box-shadow: var(--shadow);
      text-align: center;
      pointer-events: auto;
    }

    .status-panel h1,
    .status-panel h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(21px, 4vw, 30px);
      line-height: 1.12;
    }

    .status-panel p {
      margin: 12px auto 0;
      max-width: 38rem;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .spinner {
      width: 30px;
      height: 30px;
      margin: 0 auto 16px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: var(--accent-bright);
      border-radius: 50%;
      animation: spin 720ms linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .spinner, .page-spinner { animation-duration: 0s; }
      .sidebar { transition: none; }
    }

    .status-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .hidden { display: none !important; }

    .toast {
      position: absolute;
      right: clamp(12px, 2vw, 22px);
      bottom: clamp(12px, 2vw, 22px);
      z-index: 30;
      width: min(420px, calc(100% - 24px));
      padding: 13px 15px;
      border: 1px solid rgba(255, 115, 115, 0.38);
      border-radius: var(--radius);
      background: rgba(50, 19, 22, 0.94);
      color: #ffe8e8;
      box-shadow: var(--shadow);
      font-size: 14px;
      line-height: 1.4;
    }

    .drop-target {
      width: min(480px, 100%);
      padding: 28px;
      border: 1px dashed rgba(79, 181, 255, 0.72);
      border-radius: var(--radius);
      background: rgba(15, 22, 33, 0.92);
      color: var(--text);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .drop-target strong {
      display: block;
      margin-bottom: 6px;
      font-size: 20px;
      line-height: 1.2;
    }

    .drop-target span {
      color: var(--muted);
      font-size: 14px;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .controls {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: thin;
      }
    }

    /* On narrow screens the sidebar floats over the document instead of
       squeezing it. */
    @media (max-width: 820px) {
      .sidebar {
        position: absolute;
        z-index: 16;
        top: clamp(10px, 2vw, 22px);
        bottom: clamp(10px, 2vw, 22px);
        left: clamp(10px, 2vw, 22px);
      }
      .doc-col { flex-basis: 100%; }
    }

    @media (max-width: 620px) {
      body { overflow: auto; }

      .app {
        min-height: 100%;
        height: auto;
        grid-template-rows: auto minmax(74vh, 1fr);
      }

      .toolbar {
        position: sticky;
        top: 0;
      }

      .viewer { min-height: 74vh; }
      .primary-button span { display: none; }
      .invert-panel { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="toolbar" aria-label="PDF viewer controls">
      <div class="brand">
        <button class="icon-button sidebar-toggle" id="sidebarToggle" type="button" title="Toggle sidebar" aria-label="Toggle sidebar" aria-pressed="true" disabled>
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
            <path d="M9 4v16"></path>
          </svg>
        </button>
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 3h7l5 5v13H7z"></path>
            <path d="M14 3v6h5"></path>
            <path d="M9.5 14h5"></path>
            <path d="M9.5 17h3.5"></path>
          </svg>
        </div>
        <div class="title-block">
          <p class="title" id="fileName">Offline PDF Viewer</p>
          <p class="meta" id="fileMeta">Open a local PDF file</p>
        </div>
      </div>

      <div class="controls" aria-label="File controls">
        <button class="primary-button" id="openButton" type="button" title="Open PDF" aria-label="Open PDF">
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
          <span>Open</span>
        </button>
      </div>

      <div class="controls" aria-label="Page and zoom controls">
        <div class="control-group" role="group" aria-label="Page navigation">
          <button id="prevPage" type="button" title="Previous page" aria-label="Previous page" disabled>
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="m18 15-6-6-6 6"></path>
            </svg>
          </button>
          <button id="nextPage" type="button" title="Next page" aria-label="Next page" disabled>
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </button>
        </div>

        <label class="page-field">
          <span>Page</span>
          <input id="pageInput" type="number" min="1" value="1" disabled aria-label="Page number">
          <span id="pageTotal">/ -</span>
        </label>

        <div class="control-group" role="group" aria-label="Zoom controls">
          <button id="zoomOut" type="button" title="Zoom out" aria-label="Zoom out" disabled>
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path>

            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

              <path d="M3 8V5h3"></path>

            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">

    <main class="viewer" id="viewer" aria-label="PDF document area">

        <div class="sidebar-body">
          <div class="sidebar-pane thumbs-pane" id="thumbsPane" role="tabpanel" aria-label="Page thumbnails"></div>
          <div class="sidebar-pane outline-pane hidden" id="outlinePane" role="tabpanel" aria-label="Document contents"></div>
        </div>
      </aside>

      <div class="doc-col">
        <section class="document-shell" id="documentShell">
          <div class="doc-scroll" id="docScroll" tabindex="0">
            <div class="pages" id="pagesContainer"></div>
          </div>

          <div class="status-layer" id="emptyState">
            <div class="status-panel">
              <h1>Open a local PDF</h1>
              <p>Files stay in this browser window and are rendered locally &mdash; nothing is uploaded.</p>
              <div class="status-actions">
                <button class="primary-button" id="emptyOpenButton" type="button">
                  <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v12"></path>
                    <path d="m7 10 5 5 5-5"></path>
                    <path d="M5 21h14"></path>
                  </svg>
                  <span>Open PDF</span>
                </button>
              </div>
            </div>
          </div>

          <div class="status-layer hidden" id="loadingState">
            <div class="status-panel">
              <div class="spinner" aria-hidden="true"></div>
              <h2>Loading PDF</h2>
              <p id="loadingDetail">Preparing the local file for viewing.</p>
            </div>
          </div>

          <div class="drop-layer" id="dropLayer">
            <div class="drop-target">
              <strong>Drop PDF to open</strong>
              <span>The file will be rendered locally by your browser.</span>

      <div class="toast hidden" id="errorToast" role="status" aria-live="polite"></div>
    </main>
  </div>

  <input class="file-input" id="fileInput" type="file" accept="application/pdf,.pdf">

  <script src="vendor/pdf.min.js"></script>
  <script>
    (() => {
      "use strict";

      const pdfjsLib = window.pdfjsLib;
      const PDFJS_READY = Boolean(pdfjsLib && pdfjsLib.getDocument);
      if (PDFJS_READY) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "vendor/pdf.worker.min.js";
      }

      const MIN_SCALE = 0.1;
      const MAX_SCALE = 8;
      const zoomSteps = [50, 67, 75, 90, 100, 110, 125, 150, 175, 200, 250, 300, 400];
      const THUMB_WIDTH = 156;
      const MAX_RENDERED_PAGES = 8;   // bound live page canvases (memory)
      const MAX_RENDERED_THUMBS = 80;

      const state = {
        file: null,
        pdfDoc: null,
        loadTask: null,
        pageCount: 0,
        page: 1,
        baseDims: { w: 612, h: 792 },  // default until page 1 measured
        zoomMode: "fit",               // "fit" (fit width) | "custom"
        zoom: 100,
        fitScale: 1,
        scale: 1,
        invertColor: "#ffffff",
        invertEnabled: false,
        hasDocument: false,
        sidebarOpen: true,
        sidebarTab: "thumbs",
        docToken: 0                    // invalidates async work across reloads
      };

      // Per-page bookkeeping (parallel arrays indexed 0..n-1).
      const pages = [];   // { wrap, canvas, spinner, dims, rendered, task }
      const thumbs = [];  // { item, wrap, canvas, rendered, task }
      let pagePositions = [];
      const renderedPages = new Set();
      const renderedThumbs = new Set();
      let scrollRaf = 0;
      let thumbRaf = 0;
      let resizeRaf = 0;

      const els = {
        sidebarToggle: document.getElementById("sidebarToggle"),
        openButton: document.getElementById("openButton"),
        emptyOpenButton: document.getElementById("emptyOpenButton"),
        fileInput: document.getElementById("fileInput"),
        fileName: document.getElementById("fileName"),
        fileMeta: document.getElementById("fileMeta"),
        pageInput: document.getElementById("pageInput"),
        pageTotal: document.getElementById("pageTotal"),
        prevPage: document.getElementById("prevPage"),
        nextPage: document.getElementById("nextPage"),
        zoomOut: document.getElementById("zoomOut"),
        zoomIn: document.getElementById("zoomIn"),
        fitWidth: document.getElementById("fitWidth"),
        resetZoom: document.getElementById("resetZoom"),
        zoomReadout: document.getElementById("zoomReadout"),
        invertToggle: document.getElementById("invertToggle"),
        invertColor: document.getElementById("invertColor"),
        swatches: Array.from(document.querySelectorAll(".swatch")),
        viewer: document.getElementById("viewer"),
        sidebar: document.getElementById("sidebar"),
        tabThumbs: document.getElementById("tabThumbs"),
        tabOutline: document.getElementById("tabOutline"),
        thumbsPane: document.getElementById("thumbsPane"),
        outlinePane: document.getElementById("outlinePane"),
        documentShell: document.getElementById("documentShell"),
        docScroll: document.getElementById("docScroll"),
        pagesContainer: document.getElementById("pagesContainer"),
        emptyState: document.getElementById("emptyState"),
        loadingState: document.getElementById("loadingState"),
        loadingDetail: document.getElementById("loadingDetail"),
        dropLayer: document.getElementById("dropLayer"),
        errorToast: document.getElementById("errorToast")
      };

      function init() {
        els.openButton.addEventListener("click", openFilePicker);
        els.emptyOpenButton.addEventListener("click", openFilePicker);
        els.fileInput.addEventListener("change", handleFileInput);
        els.sidebarToggle.addEventListener("click", toggleSidebar);
        els.tabThumbs.addEventListener("click", () => setSidebarTab("thumbs"));
        els.tabOutline.addEventListener("click", () => setSidebarTab("outline"));
        els.prevPage.addEventListener("click", () => goToPage(state.page - 1));
        els.nextPage.addEventListener("click", () => goToPage(state.page + 1));
        els.pageInput.addEventListener("change", handlePageInput);
        els.pageInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") handlePageInput();
        });
        els.zoomOut.addEventListener("click", () => stepZoom(-1));
        els.zoomIn.addEventListener("click", () => stepZoom(1));
        els.fitWidth.addEventListener("click", fitWidth);
        els.resetZoom.addEventListener("click", resetZoom);
        els.invertToggle.addEventListener("change", () => {
          state.invertEnabled = els.invertToggle.checked;
          renderInversion();
        });
        els.invertColor.addEventListener("input", () => setInvertColor(els.invertColor.value));
        els.swatches.forEach((button) => {
          button.addEventListener("click", () => setInvertColor(button.dataset.color));
        });

        els.docScroll.addEventListener("scroll", onDocScroll, { passive: true });
        els.thumbsPane.addEventListener("scroll", onThumbScroll, { passive: true });
        els.sidebar.addEventListener("transitionend", (event) => {
          if (event.propertyName === "margin-left") refitForWidth();
        });

        window.addEventListener("dragenter", showDropLayer);
        window.addEventListener("dragover", handleDragOver);
        window.addEventListener("dragleave", handleDragLeave);
        window.addEventListener("drop", handleDrop);
        window.addEventListener("keydown", handleKeyboard);
        window.addEventListener("resize", onResize);

        if (!PDFJS_READY) {
          showError("Could not load the bundled PDF engine (vendor/pdf.min.js). Make sure the vendor folder sits next to this page.");
        }

        renderControls();
      }

      function openFilePicker() {
        els.fileInput.click();
      }

      function handleFileInput() {
        const [file] = els.fileInput.files;
        if (file) loadFile(file);
        els.fileInput.value = "";
      }

      function handleDragOver(event) {
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
        showDropLayer();
      }

      function showDropLayer() {
        els.dropLayer.classList.add("is-visible");
      }

      function handleDragLeave(event) {
        if (event.target === window || event.clientX <= 0 || event.clientY <= 0 ||
          event.clientX >= window.innerWidth || event.clientY >= window.innerHeight) {
          els.dropLayer.classList.remove("is-visible");
        }
      }

      function handleDrop(event) {
        event.preventDefault();
        els.dropLayer.classList.remove("is-visible");
        const file = Array.from(event.dataTransfer.files).find((item) => {
          return item.type === "application/pdf" || /\.pdf$/i.test(item.name);
        });
        if (!file) {
          showError("No PDF file was found in that drop.");
          return;
        }
        loadFile(file);
      }

      async function loadFile(file) {
        if (!PDFJS_READY) {
          showError("The PDF engine is unavailable, so this file cannot be opened.");
          return;
        }

        clearError();
        showLoading(`Opening ${file.name}`);
        const token = ++state.docToken;

        try {
          if (!looksLikePdfName(file)) {
            throw new Error("Choose a file with a .pdf extension or application/pdf type.");
          }

          const data = await file.arrayBuffer();
          if (!hasPdfHeader(data)) {
            throw new Error("This file does not look like a valid PDF.");
          }

          await teardownDocument();
          if (token !== state.docToken) return;

          state.loadTask = pdfjsLib.getDocument({ data: new Uint8Array(data) });
          const pdfDoc = await state.loadTask.promise;
          state.loadTask = null;
          if (token !== state.docToken) { try { await pdfDoc.destroy(); } catch (_) {} return; }

          state.file = file;
          state.pdfDoc = pdfDoc;
          state.pageCount = pdfDoc.numPages;
          state.page = 1;
          state.zoomMode = "fit";
          state.zoom = 100;
          state.hasDocument = true;

          // Measure page 1 to seed placeholder sizes.
          const first = await pdfDoc.getPage(1);
          const v = first.getViewport({ scale: 1 });
          state.baseDims = { w: v.width, h: v.height };

          els.emptyState.classList.add("hidden");
          els.loadingState.classList.add("hidden");

          buildPages();
          buildThumbs();
          computeScale();
          layoutPages();
          els.docScroll.scrollTop = 0;
          updatePageRendering();
          renderControls();
          buildOutline(token);
          els.docScroll.focus({ preventScroll: true });
        } catch (error) {
          if (token !== state.docToken) return;
          resetToEmpty();
          showError(describeLoadError(error));
        }
      }

      function resetToEmpty() {
        state.hasDocument = false;
        state.pdfDoc = null;
        state.loadTask = null;
        els.pagesContainer.replaceChildren();
        els.thumbsPane.replaceChildren();
        els.outlinePane.replaceChildren();
        pages.length = 0;
        thumbs.length = 0;
        pagePositions = [];
        renderedPages.clear();
        renderedThumbs.clear();
        els.loadingState.classList.add("hidden");
        els.emptyState.classList.remove("hidden");
        renderControls();
      }

      async function teardownDocument() {
        renderedPages.forEach((n) => freePage(n));
        renderedThumbs.forEach((n) => freeThumb(n));
        renderedPages.clear();
        renderedThumbs.clear();
        pages.forEach((p) => { if (p.task) { try { p.task.cancel(); } catch (_) {} } });
        thumbs.forEach((t) => { if (t.task) { try { t.task.cancel(); } catch (_) {} } });
        els.pagesContainer.replaceChildren();
        els.thumbsPane.replaceChildren();
        els.outlinePane.replaceChildren();
        pages.length = 0;
        thumbs.length = 0;
        pagePositions = [];
        if (state.pdfDoc) {
          const doc = state.pdfDoc;
          state.pdfDoc = null;
          try { await doc.destroy(); } catch (_) {}
        }
      }

      function looksLikePdfName(file) {
        return file.type === "application/pdf" || /\.pdf$/i.test(file.name);
      }

      function hasPdfHeader(buffer) {
        const bytes = new Uint8Array(buffer.slice(0, 1024));
        return new TextDecoder("latin1").decode(bytes).includes("%PDF-");
      }

      function describeLoadError(error) {
        const name = error && error.name;
        if (name === "PasswordException") return "This PDF is password protected and cannot be opened here.";
        if (name === "InvalidPDFException") return "This PDF appears to be damaged or invalid.";
        return (error && error.message) || "The PDF could not be opened.";
      }

      // ---------- Build DOM placeholders ----------
      function buildPages() {
        const frag = document.createDocumentFragment();
        for (let i = 1; i <= state.pageCount; i++) {
          const wrap = document.createElement("div");
          wrap.className = "page-wrap";
          wrap.dataset.page = String(i);
          const canvas = document.createElement("canvas");
          canvas.className = "page-canvas";
          const spinner = document.createElement("div");
          spinner.className = "page-spinner";
          spinner.setAttribute("aria-hidden", "true");
          wrap.append(canvas, spinner);
          frag.appendChild(wrap);
          pages.push({ wrap, canvas, spinner, dims: { ...state.baseDims }, rendered: false, task: null });
        }
        els.pagesContainer.appendChild(frag);
      }

      function buildThumbs() {
        const frag = document.createDocumentFragment();
        for (let i = 1; i <= state.pageCount; i++) {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "thumb-item";
          item.dataset.page = String(i);
          const cwrap = document.createElement("span");
          cwrap.className = "thumb-canvas-wrap";
          const ratio = state.baseDims.h / state.baseDims.w;
          cwrap.style.height = Math.round(THUMB_WIDTH * ratio) + "px";
          const canvas = document.createElement("canvas");
          canvas.className = "thumb-canvas";
          const label = document.createElement("span");
          label.className = "thumb-label";
          label.textContent = String(i);
          cwrap.appendChild(canvas);
          item.append(cwrap, label);
          item.addEventListener("click", () => goToPage(i));
          frag.appendChild(item);
          thumbs.push({ item, wrap: cwrap, canvas, rendered: false, task: null });
        }
        els.thumbsPane.appendChild(frag);
      }

      async function buildOutline(token) {
        els.outlinePane.replaceChildren();
        let outline = null;
        try {
          outline = await state.pdfDoc.getOutline();
        } catch (_) { outline = null; }
        if (token !== state.docToken) return;

        if (!outline || outline.length === 0) {
          const empty = document.createElement("div");
          empty.className = "sidebar-empty";
          empty.textContent = "This PDF has no embedded contents / bookmarks.";
          els.outlinePane.appendChild(empty);
          return;
        }
        els.outlinePane.appendChild(renderOutlineLevel(outline));
      }

      function renderOutlineLevel(items) {
        const ul = document.createElement("ul");
        ul.className = "outline-list";
        items.forEach((item) => {
          const li = document.createElement("li");
          const row = document.createElement("div");
          row.className = "outline-row";

          const hasKids = item.items && item.items.length > 0;
          const twisty = document.createElement("button");
          twisty.type = "button";
          twisty.className = "outline-twisty" + (hasKids ? "" : " is-empty");
          twisty.textContent = "▾"; // ▾
          twisty.setAttribute("aria-label", "Toggle section");

          const link = document.createElement("button");
          link.type = "button";
          link.className = "outline-link";
          link.textContent = item.title || "(untitled)";
          if (item.bold) link.style.fontWeight = "700";
          if (item.italic) link.style.fontStyle = "italic";
          link.addEventListener("click", () => navigateToDest(item.dest));

          row.append(twisty, link);
          li.appendChild(row);

          if (hasKids) {
            const children = renderOutlineLevel(item.items);
            children.classList.add("outline-children");
            twisty.addEventListener("click", () => {
              const collapsed = children.classList.toggle("is-collapsed");
              twisty.textContent = collapsed ? "▸" : "▾"; // ▸ / ▾
            });
            li.appendChild(children);
          }
          ul.appendChild(li);
        });
        return ul;
      }

      async function navigateToDest(dest) {
        if (!state.pdfDoc || !dest) return;
        try {
          let explicit = dest;
          if (typeof dest === "string") explicit = await state.pdfDoc.getDestination(dest);
          if (!Array.isArray(explicit) || !explicit.length) return;
          const ref = explicit[0];
          const pageIndex = await state.pdfDoc.getPageIndex(ref);
          goToPage(pageIndex + 1);
        } catch (_) { /* ignore unresolved destinations */ }
      }

      // ---------- Layout & scale ----------
      function computeScale() {
        if (state.zoomMode === "fit") {
          const cs = getComputedStyle(els.pagesContainer);
          const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
          const avail = els.docScroll.clientWidth - padX;
          const s = avail > 0 ? avail / state.baseDims.w : 1;
          state.scale = clamp(s, MIN_SCALE, MAX_SCALE);
          state.fitScale = state.scale;
        } else {
          state.scale = clamp(state.zoom / 100, MIN_SCALE, MAX_SCALE);
        }
      }

      function sizeWrap(p) {
        p.wrap.style.width = Math.floor(p.dims.w * state.scale) + "px";
        p.wrap.style.height = Math.floor(p.dims.h * state.scale) + "px";
      }

      function layoutPages() {
        pages.forEach(sizeWrap);
        recomputePositions();
      }

      function recomputePositions() {
        const baseTop = els.docScroll.getBoundingClientRect().top;
        const scrollTop = els.docScroll.scrollTop;
        pagePositions = pages.map((p) => {
          const r = p.wrap.getBoundingClientRect();
          return r.top - baseTop + scrollTop;
        });
      }

      // ---------- Page rendering (virtualized) ----------
      function updatePageRendering() {
        if (!state.hasDocument) return;
        const top = els.docScroll.scrollTop;
        const viewportH = els.docScroll.clientHeight;
        const margin = viewportH; // ~1 screen of look-ahead
        for (let i = 0; i < pages.length; i++) {
          const start = pagePositions[i] || 0;
          const end = start + pages[i].wrap.offsetHeight;
          if (end >= top - margin && start <= top + viewportH + margin) {
            renderPage(i + 1);
          }
        }
        freeFarPages();
      }

      async function renderPage(num) {
        const p = pages[num - 1];
        if (!p || p.rendered || p.task) return;
        const token = state.docToken;
        let page;
        try {
          page = await state.pdfDoc.getPage(num);
        } catch (_) { return; }
        if (token !== state.docToken) return;

        // Correct placeholder size if this page differs from the seed.
        const unscaled = page.getViewport({ scale: 1 });
        if (Math.abs(unscaled.width - p.dims.w) > 0.5 || Math.abs(unscaled.height - p.dims.h) > 0.5) {
          p.dims = { w: unscaled.width, h: unscaled.height };
          sizeWrap(p);
          recomputePositions();
        }

        const dpr = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale: state.scale });
        const canvas = p.canvas;
        const ctx = canvas.getContext("2d", { alpha: false });
        canvas.width = Math.max(1, Math.floor(viewport.width * dpr));
        canvas.height = Math.max(1, Math.floor(viewport.height * dpr));

        p.task = page.render({
          canvasContext: ctx,
          viewport,
          transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null,
          background: "#ffffff"
        });
        try {
          await p.task.promise;
        } catch (error) {
          p.task = null;
          return; // RenderingCancelledException or doc gone
        }
        if (token !== state.docToken) { p.task = null; return; }
        p.task = null;
        p.rendered = true;
        renderedPages.add(num);
        canvas.classList.add("is-rendered");
        p.wrap.classList.add("is-rendered");
        freeFarPages();
      }

      function freeFarPages() {
        if (renderedPages.size <= MAX_RENDERED_PAGES) return;
        const far = [...renderedPages].sort(
          (a, b) => Math.abs(b - state.page) - Math.abs(a - state.page)
        );
        while (renderedPages.size > MAX_RENDERED_PAGES) {
          const n = far.shift();
          if (n === undefined) break;
          freePage(n);
        }
      }

      function freePage(num) {
        const p = pages[num - 1];
        if (!p) return;
        if (p.task) { try { p.task.cancel(); } catch (_) {} p.task = null; }
        p.canvas.width = 0;
        p.canvas.height = 0;
        p.canvas.classList.remove("is-rendered");
        p.wrap.classList.remove("is-rendered");
        p.rendered = false;
        renderedPages.delete(num);
      }

      // ---------- Thumbnail rendering (virtualized) ----------
      function updateThumbRendering() {
        if (!state.hasDocument || !state.sidebarOpen || state.sidebarTab !== "thumbs") return;
        const pane = els.thumbsPane;
        const top = pane.scrollTop;
        const h = pane.clientHeight;
        const margin = h;
        for (let i = 0; i < thumbs.length; i++) {
          const el = thumbs[i].item;
          const start = el.offsetTop;
          const end = start + el.offsetHeight;
          if (end >= top - margin && start <= top + h + margin) {
            renderThumb(i + 1);
          }
        }
        freeFarThumbs();
      }

      async function renderThumb(num) {
        const t = thumbs[num - 1];
        if (!t || t.rendered || t.task) return;
        const token = state.docToken;
        let page;
        try {
          page = await state.pdfDoc.getPage(num);
        } catch (_) { return; }
        if (token !== state.docToken) return;

        const unscaled = page.getViewport({ scale: 1 });
        const scale = THUMB_WIDTH / unscaled.width;
        const viewport = page.getViewport({ scale });
        t.wrap.style.height = Math.round(viewport.height) + "px";
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const canvas = t.canvas;
        const ctx = canvas.getContext("2d", { alpha: false });
        canvas.width = Math.max(1, Math.floor(viewport.width * dpr));
        canvas.height = Math.max(1, Math.floor(viewport.height * dpr));

        t.task = page.render({
          canvasContext: ctx,
          viewport,
          transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null,
          background: "#ffffff"
        });
        try {
          await t.task.promise;
        } catch (error) {
          t.task = null;
          return;
        }
        if (token !== state.docToken) { t.task = null; return; }
        t.task = null;
        t.rendered = true;
        renderedThumbs.add(num);
      }

      function freeFarThumbs() {
        if (renderedThumbs.size <= MAX_RENDERED_THUMBS) return;
        const far = [...renderedThumbs].sort(
          (a, b) => Math.abs(b - state.page) - Math.abs(a - state.page)
        );
        while (renderedThumbs.size > MAX_RENDERED_THUMBS) {
          const n = far.shift();
          if (n === undefined) break;
          freeThumb(n);
        }
      }

      function freeThumb(num) {
        const t = thumbs[num - 1];
        if (!t) return;
        if (t.task) { try { t.task.cancel(); } catch (_) {} t.task = null; }
        t.canvas.width = 0;
        t.canvas.height = 0;
        t.rendered = false;
        renderedThumbs.delete(num);
      }

      // ---------- Scroll & current-page tracking ----------
      function onDocScroll() {
        if (scrollRaf) return;
        scrollRaf = requestAnimationFrame(() => {
          scrollRaf = 0;
          syncCurrentPage();
          updatePageRendering();
        });
      }

      function onThumbScroll() {
        if (thumbRaf) return;
        thumbRaf = requestAnimationFrame(() => {
          thumbRaf = 0;
          updateThumbRendering();
        });
      }

      function syncCurrentPage() {
        if (!state.hasDocument || !pagePositions.length) return;
        const probe = els.docScroll.scrollTop + els.docScroll.clientHeight * 0.4;
        let current = 1;
        for (let i = 0; i < pagePositions.length; i++) {
          if (pagePositions[i] <= probe) current = i + 1;
          else break;
        }
        if (current !== state.page) {
          state.page = current;
          updatePageUI();
        }
      }

      function updatePageUI() {
        els.pageInput.value = String(state.page);
        els.prevPage.disabled = state.page <= 1;
        els.nextPage.disabled = state.page >= state.pageCount;
        highlightCurrent();
      }

      function highlightCurrent() {
        thumbs.forEach((t, i) => {
          t.item.classList.toggle("is-current", i + 1 === state.page);
        });
        els.outlinePane.querySelectorAll(".outline-link.is-current")
          .forEach((el) => el.classList.remove("is-current"));
        if (state.sidebarOpen && state.sidebarTab === "thumbs") {
          const cur = thumbs[state.page - 1];
          if (cur) {
            cur.item.scrollIntoView({ block: "nearest" });
            updateThumbRendering();
          }
        }
      }

      // ---------- Navigation ----------
      function goToPage(num) {
        if (!state.hasDocument) return;
        const target = clamp(Math.round(Number(num) || 1), 1, state.pageCount);
        state.page = target;
        const pos = pagePositions[target - 1];
        if (typeof pos === "number") {
          els.docScroll.scrollTop = Math.max(0, pos - 12);
        }
        updatePageUI();
        updatePageRendering();
      }

      function handlePageInput() {
        goToPage(els.pageInput.value);
      }

      // ---------- Zoom ----------
      function rescale(nextMode, nextZoom) {
        // Preserve the reading position by anchoring to the current page.
        const anchor = state.page;
        const oldPos = pagePositions[anchor - 1] || 0;
        const oldH = pages[anchor - 1] ? pages[anchor - 1].wrap.offsetHeight : 1;
        const frac = oldH ? (els.docScroll.scrollTop - oldPos) / oldH : 0;

        state.zoomMode = nextMode;
        if (typeof nextZoom === "number") state.zoom = nextZoom;
        computeScale();

        // Stale canvases were rendered at the old scale; drop them all.
        [...renderedPages].forEach(freePage);
        layoutPages();

        const newPos = pagePositions[anchor - 1] || 0;
        const newH = pages[anchor - 1] ? pages[anchor - 1].wrap.offsetHeight : 1;
        els.docScroll.scrollTop = Math.max(0, newPos + frac * newH);

        updatePageRendering();
        renderControls();
      }

      function stepZoom(direction) {
        if (!state.hasDocument) return;
        const current = state.zoomMode === "fit"
          ? Math.round(state.fitScale * 100)
          : state.zoom;
        let index;
        if (direction > 0) {
          index = zoomSteps.findIndex((s) => s > current);
          if (index === -1) index = zoomSteps.length - 1;
        } else {
          const prev = [...zoomSteps].reverse().find((s) => s < current);
          index = prev === undefined ? 0 : zoomSteps.indexOf(prev);
        }
        rescale("custom", zoomSteps[index]);
      }

      function fitWidth() {
        if (!state.hasDocument) return;
        rescale("fit");
      }

      function resetZoom() {
        if (!state.hasDocument) return;
        rescale("custom", 100);
      }

      function onResize() {
        if (!state.hasDocument) return;
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => {
          resizeRaf = 0;
          if (state.zoomMode === "fit") {
            rescale("fit");
          } else {
            recomputePositions();
            updatePageRendering();
          }
        });
      }

      // ---------- Sidebar ----------
      function toggleSidebar() {
        setSidebar(!state.sidebarOpen);
      }

      function setSidebar(open) {
        state.sidebarOpen = open;
        els.viewer.classList.toggle("is-sidebar-collapsed", !open);
        els.sidebarToggle.classList.toggle("is-active", open);
        els.sidebarToggle.setAttribute("aria-pressed", String(open));
        if (open) {
          updateThumbRendering();
          highlightCurrent();
        }
        // The document width changes with the sidebar. Re-fit on the next
        // frame (covers reduced-motion / no transition) and again on
        // transitionend (covers the animated case, using the final width).
        requestAnimationFrame(refitForWidth);
      }

      function refitForWidth() {
        if (!state.hasDocument) return;
        if (state.zoomMode === "fit") rescale("fit");
        else { recomputePositions(); updatePageRendering(); }
      }

      function setSidebarTab(tab) {
        state.sidebarTab = tab;
        const isThumbs = tab === "thumbs";
        els.tabThumbs.classList.toggle("is-active", isThumbs);
        els.tabOutline.classList.toggle("is-active", !isThumbs);
        els.tabThumbs.setAttribute("aria-selected", String(isThumbs));
        els.tabOutline.setAttribute("aria-selected", String(!isThumbs));
        els.thumbsPane.classList.toggle("hidden", !isThumbs);
        els.outlinePane.classList.toggle("hidden", isThumbs);
        if (isThumbs) {
          updateThumbRendering();
          highlightCurrent();
        }
      }

      // ---------- Inversion ----------
      function setInvertColor(color) {
        state.invertColor = normalizeHexColor(color);
        els.invertColor.value = state.invertColor;
        renderInversion();
        renderSwatches();
      }

      function renderInversion() {
        const active = state.hasDocument && state.invertEnabled;
        let filter = "none";
        if (active) {
          const tint = tintFilter(state.invertColor);
          filter = `invert(1) hue-rotate(180deg)${tint ? " " + tint : ""}`;
        }
        els.pagesContainer.style.setProperty("--page-filter", filter);
        els.pagesContainer.classList.toggle("is-inverted", active);
      }

      function tintFilter(hex) {
        const { h, s } = hexToHsl(hex);
        if (s < 0.08) return "";
        const rotate = Math.round(h - 40);
        const saturate = (1.05 + s * 0.9).toFixed(2);
        return `sepia(0.55) saturate(${saturate}) hue-rotate(${rotate}deg) brightness(0.96)`;
      }

      function renderSwatches() {
        els.swatches.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.color.toLowerCase() === state.invertColor);
        });
      }

      // ---------- Controls / chrome ----------
      function renderControls() {
        const enabled = state.hasDocument;
        const controls = [
          els.sidebarToggle, els.prevPage, els.nextPage, els.pageInput,
          els.zoomOut, els.zoomIn, els.fitWidth, els.resetZoom,
          els.invertToggle, els.invertColor, els.tabThumbs, els.tabOutline,
          ...els.swatches
        ];
        controls.forEach((control) => { control.disabled = !enabled; });

        els.pageInput.value = String(state.page);
        els.pageInput.max = state.pageCount ? String(state.pageCount) : "";
        els.pageTotal.textContent = state.pageCount ? `/ ${state.pageCount}` : "/ -";
        els.prevPage.disabled = !enabled || state.page <= 1;
        els.nextPage.disabled = !enabled || state.page >= state.pageCount;

        const percent = state.zoomMode === "fit"
          ? Math.round(state.fitScale * 100)
          : state.zoom;
        els.zoomReadout.textContent = state.zoomMode === "fit" ? `Fit · ${percent}%` : `${percent}%`;
        els.zoomOut.disabled = !enabled || percent <= zoomSteps[0];
        els.zoomIn.disabled = !enabled || percent >= zoomSteps[zoomSteps.length - 1];
        els.invertToggle.checked = state.invertEnabled;

        if (enabled && state.file) {
          els.fileName.textContent = state.file.name;
          const pages = state.pageCount ? `${state.pageCount} page${state.pageCount === 1 ? "" : "s"}` : "Page count unavailable";
          els.fileMeta.textContent = `${formatBytes(state.file.size)} · ${pages}`;
        } else {
          els.fileName.textContent = "Offline PDF Viewer";
          els.fileMeta.textContent = "Open a local PDF file";
        }

        renderInversion();
        renderSwatches();
        highlightCurrent();
      }

      function showLoading(message) {
        els.loadingDetail.textContent = message;
        els.emptyState.classList.add("hidden");
        els.loadingState.classList.remove("hidden");
      }

      function showError(message) {
        els.errorToast.textContent = message;
        els.errorToast.classList.remove("hidden");
      }

      function clearError() {
        els.errorToast.classList.add("hidden");
        els.errorToast.textContent = "";
      }

      function handleKeyboard(event) {
        if (event.target instanceof HTMLInputElement) return;
        if (!state.hasDocument) return;

        if (event.key === "ArrowLeft") {
          event.preventDefault();
          goToPage(state.page - 1);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          goToPage(state.page + 1);
        } else if ((event.metaKey || event.ctrlKey) && (event.key === "=" || event.key === "+")) {
          event.preventDefault();
          stepZoom(1);
        } else if ((event.metaKey || event.ctrlKey) && event.key === "-") {
          event.preventDefault();
          stepZoom(-1);
        } else if ((event.metaKey || event.ctrlKey) && event.key === "0") {
          event.preventDefault();
          resetZoom();
        } else if (event.key.toLowerCase() === "i" && !event.metaKey && !event.ctrlKey && !event.altKey) {
          event.preventDefault();
          state.invertEnabled = !state.invertEnabled;
          els.invertToggle.checked = state.invertEnabled;
          renderInversion();
        } else if (event.key.toLowerCase() === "s" && !event.metaKey && !event.ctrlKey && !event.altKey) {
          event.preventDefault();
          toggleSidebar();
        }
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        const value = bytes / 1024 ** index;
        return `${value >= 10 || index === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[index]}`;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function normalizeHexColor(color) {
        if (/^#[0-9a-f]{6}$/i.test(color)) return color.toLowerCase();
        if (/^#[0-9a-f]{3}$/i.test(color)) {
          const c = color.slice(1);
          return `#${c[0]}${c[0]}${c[1]}${c[1]}${c[2]}${c[2]}`.toLowerCase();
        }
        return "#ffffff";
      }

      function hexToHsl(hex) {
        const value = normalizeHexColor(hex).slice(1);
        const r = parseInt(value.slice(0, 2), 16) / 255;
        const g = parseInt(value.slice(2, 4), 16) / 255;
        const b = parseInt(value.slice(4, 6), 16) / 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const delta = max - min;
        const l = (max + min) / 2;
        let h = 0;
        let s = 0;
        if (delta !== 0) {
          s = delta / (1 - Math.abs(2 * l - 1));
          if (max === r) h = ((g - b) / delta) % 6;
          else if (max === g) h = (b - r) / delta + 2;
          else h = (r - g) / delta + 4;
          h *= 60;
          if (h < 0) h += 360;
        }
        return { h, s, l };
      }

      init();
    })();
  </script>
</body>
</html>
